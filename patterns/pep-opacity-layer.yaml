name: pep_opacity_layer
title: PEP Opacity Layer
description: >
  Offshore entities controlled by politically exposed persons through
  nominees, designed to avoid triggering enhanced due diligence.
  The PEP's name does not appear in corporate records; family members,
  associates, or professional nominees hold formal positions.
  EU AMLD4+ requires EDD for both domestic and foreign PEPs.
risk_level: HIGH
status: CONFIRMED
sources:
  - fatf_bo_concealment_2018
  - eu_amld_annex_iii
  - icij_investigations
references:
  - title: "FATF-Egmont — Concealment of Beneficial Ownership (2018)"
    url: https://www.fatf-gafi.org/content/dam/fatf-gafi/reports/FATF-Egmont-Concealment-beneficial-ownership.pdf
  - title: "EU Anti-Money Laundering Directive (AMLD5)"
    url: https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=celex%3A32018L0843
  - title: "ICIJ Investigations"
    url: https://www.icij.org/investigations/

detection:
  conditions:
    - id: pep_family_officer
      description: >
        Entity officer matches PEP family member or close associate
        in OpenSanctions (topic: role.rca)
      type: cross_source_match
      icij_field: officer_name
      opensanctions_topic: role.rca
      threshold: 0.7

    - id: pep_absent
      description: >
        PEP's own name absent from ICIJ entity records but family
        members present
      type: name_absence
      absent: pep_name
      present: pep_family_names

    - id: nominee_layer
      description: Professional nominee directors interposed
      type: node_degree
      node_type: [Officer, Person]
      min_degree: 20

  indicators:
    - PEP family members as officers (shared surname)
    - Entity in high-secrecy jurisdiction, PEP in country with scrutiny
    - Professional nominee between PEP associates and entity
    - EU AMLD Annex III - PEP involvement is mandatory EDD trigger
    - FATF - informal nominees (family/associates) most common technique

  scoring:
    high: [pep_family_officer, pep_absent]
    medium: pep_family_officer
    low: null

  data_sources: [icij, opensanctions, companies_house]

name: nominee_shield
title: The Nominee Shield
description: >
  Professional nominee directors and shareholders interposed between
  the true beneficial owner and the entity. FATF-Egmont (2018) found
  this is the most common technique for concealing beneficial ownership.
risk_level: HIGH
status: ESTABLISHED
sources:
  - fatf_bo_concealment_2018
  - moodys_shell_indicators
  - all_five_investigations

detection:
  conditions:
    - id: mass_directorships
      description: Individual holds directorships in 20+ unrelated entities
      type: node_degree
      node_type: [Officer, Person]
      relationship: officer_of
      min_degree: 20

    - id: corporate_director
      description: A company serves as director of another company
      type: node_type_match
      director_type: [Entity, Company, Organization]

    - id: secrecy_jurisdiction
      description: Entity in jurisdiction with weak disclosure requirements
      type: jurisdiction_risk
      jurisdictions: [VG, SC, WS, KN, PA]

  indicators:
    - Same director name across hundreds of unrelated entities
    - Director age anomalies (too young or too old per Moody's)
    - Director in different country from all entities they direct
    - No evidence of director having business relationship with entities
    - FATF Annex E flag - nominee arrangements

  scoring:
    high: [mass_directorships, corporate_director]
    medium: [mass_directorships, secrecy_jurisdiction]
    low: mass_directorships

  data_sources: [icij, companies_house]

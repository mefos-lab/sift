name: starburst
title: The Starburst
description: >
  One beneficial owner (or nominee) connected to many entities,
  forming a hub-and-spoke topology. Common in legitimate businesses
  but high risk when combined with nominee structures.
risk_level: MEDIUM
status: ESTABLISHED
sources:
  - fatf_bo_concealment_2018
  - all_five_investigations

detection:
  conditions:
    - id: hub_degree
      description: Single officer connected to 10+ entities
      type: node_degree
      node_type: [Officer, Person]
      relationship: [officer_of, co_officer]
      min_degree: 10

    - id: spoke_isolation
      description: Spoke entities have low degree (not interconnected)
      type: neighbor_avg_degree
      scope: hub_neighbors
      max_avg_degree: 3

    - id: nominee_indicator
      description: Hub node appears to be a professional nominee
      type: node_degree
      node_type: [Officer, Person]
      min_degree: 50
      optional: true

  indicators:
    - Nominee director services
    - Entities in different jurisdictions with no business connection
    - Corporate directors (company as director of company)
    - Hub node has no visible business operations of their own

  scoring:
    high: [hub_degree, spoke_isolation, nominee_indicator]
    medium: [hub_degree, spoke_isolation]
    low: hub_degree

  data_sources: [icij, companies_house, gleif]

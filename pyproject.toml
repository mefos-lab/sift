[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "icij-mcp"
version = "0.1.0"
description = "MCP server for the ICIJ Offshore Leaks Database"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
icij-mcp = "icij_mcp.server:main"
